name: example
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  mixpanel_flutter_session_replay:
    path: ../
  http: ^1.2.0
  logging: ^1.2.0
  intl: ^0.19.0
  provider: ^6.0.0
  path_provider: ^2.1.0
  image: ^4.3.0
  mixpanel_flutter: ^2.5.0

# Override mixpanel_flutter to the local checkout that carries the
# MixpanelEventBridge subscriber (forwards native track() events into Dart so
# session_replay's TriggerService can evaluate them). Also pin
# mixpanel_flutter_common to the same path so both packages resolve to the
# same singleton bridge instance.
dependency_overrides:
  mixpanel_flutter:
    path: ../../mixpanel-flutter/packages/mixpanel_flutter
  mixpanel_flutter_common:
    path: ../../mixpanel-flutter/packages/mixpanel_flutter_common

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/test_data.json
    - assets/compression_golden/android/
    - assets/compression_golden/ios/
    - assets/compression_golden/macos/
